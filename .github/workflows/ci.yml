name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  bindings:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy,rustfmt
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ runner.os }}
          repository-cache: true
      - name: Install Gerbil (Linux)
        if: runner.os == 'Linux'
        env:
          GERBIL_COMMIT: 07c8481588a8b07dbf05832687817cd398902ac0
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git libssl-dev
          git clone https://github.com/mighty-gerbils/gerbil.git "$RUNNER_TEMP/gerbil"
          git -C "$RUNNER_TEMP/gerbil" checkout "$GERBIL_COMMIT"
          cd "$RUNNER_TEMP/gerbil/src"
          export GERBIL_PREFIX="$RUNNER_TEMP/gerbil/build"
          ./build.sh
          echo "$GERBIL_PREFIX/bin" >> "$GITHUB_PATH"
          {
            echo "GERBIL_HOME=$GERBIL_PREFIX"
            echo "GERBIL_GSC=$GERBIL_PREFIX/bin/gsc"
            echo "LD_LIBRARY_PATH=$GERBIL_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"
      - name: Install Gerbil (macOS)
        if: runner.os == 'macOS'
        run: |
          brew tap tao3k/gerbil
          brew install gerbil-scheme
          gsc_path="$(command -v gsc)"
          test -x "$gsc_path"
          echo "GERBIL_GSC=$gsc_path" >> "$GITHUB_ENV"
      - name: Toolchain receipt
        run: |
          rustc --version
          cargo --version
          test -x "$GERBIL_GSC"
          "$GERBIL_GSC" -v
          gxc --version
          gxi --version
          bazel version
      - name: Cargo format
        run: cargo fmt --all --check
      - name: Cargo gates
        run: |
          cargo check --workspace --locked
          cargo test --workspace --locked
          cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Bazel gates
        run: |
          bazel query //...
          bazel build //...
          bazel test //:ci
